<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intelligent Attendance Monitoring System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color: white;
    padding:20px;
}

.container {
    max-width:1100px;
    margin:auto;
}

.card {
    background:#1e2a38;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

input, select, button {
    padding:8px;
    margin:5px;
    border-radius:5px;
    border:none;
}

button {
    background:#00c6ff;
    cursor:pointer;
    font-weight:bold;
}

button:hover {
    background:#0072ff;
    color:white;
}

table {
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

th, td {
    padding:8px;
    text-align:center;
}

th {
    background:#00c6ff;
    color:black;
}

.safe { color:#00ff88; font-weight:bold; }
.risk { color:#ff4d4d; font-weight:bold; }

.stats {
    display:flex;
    justify-content:space-between;
    margin-top:15px;
    font-weight:bold;
}
</style>
</head>

<body>
<div class="container">

<h2>🎓 Intelligent Attendance Monitoring & Predictive Analytics</h2>

<div class="card">
<input type="text" id="name" placeholder="Student Name">
<input type="text" id="subject" placeholder="Subject">
<input type="number" id="present" placeholder="Classes Attended">
<input type="number" id="total" placeholder="Total Classes">
<button onclick="addRecord()">Add Record</button>
</div>

<div class="card">
<input type="text" id="search" placeholder="Search Student" onkeyup="renderTable()">
<select id="filter" onchange="renderTable()">
<option value="all">All</option>
<option value="safe">Safe</option>
<option value="risk">High Risk</option>
</select>
<button onclick="exportCSV()">Export CSV</button>
<button onclick="downloadPDF()">Download PDF</button>
</div>

<div class="card">
<canvas id="lineChart"></canvas>
</div>

<div class="card">
<div class="stats">
<div>Class Average: <span id="average">0</span>%</div>
<div>Std Deviation: <span id="std">0</span></div>
</div>
</div>

<div class="card">
<table id="table">
<thead>
<tr>
<th>Name</th>
<th>Subject</th>
<th>%</th>
<th>Status</th>
<th>Risk</th>
<th>Classes to 75%</th>
<th>Forecast (5)</th>
<th>Date</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>

<script>

let records = JSON.parse(localStorage.getItem("records")) || [];

function classesToReach75(present, total){
    let required = 0;
    while(((present + required)/(total + required))*100 < 75){
        required++;
    }
    return required;
}

function forecastAfter5(present,total){
    return (((present+5)/(total+5))*100).toFixed(2);
}

function calculateStd(values){
    let mean = values.reduce((a,b)=>a+b,0)/values.length;
    let variance = values.reduce((sum,val)=>sum+Math.pow(val-mean,2),0)/values.length;
    return Math.sqrt(variance).toFixed(2);
}

function addRecord(){
    let name = document.getElementById("name").value;
    let subject = document.getElementById("subject").value;
    let present = parseInt(document.getElementById("present").value);
    let total = parseInt(document.getElementById("total").value);

    if(!name || !subject || !present || !total){
        alert("Fill all fields");
        return;
    }

    let percentage = ((present/total)*100).toFixed(2);
    let status = percentage >= 75 ? "Safe" : "High Risk";
    let risk = (100 - percentage).toFixed(2);
    let classesNeeded = classesToReach75(present,total);
    let forecast = forecastAfter5(present,total);
    let date = new Date().toLocaleString();

    records.push({name,subject,percentage,status,risk,classesNeeded,forecast,date});
    localStorage.setItem("records",JSON.stringify(records));

    renderTable();
}

function renderTable(){
    let tbody = document.querySelector("#table tbody");
    tbody.innerHTML="";

    let search = document.getElementById("search").value.toLowerCase();
    let filter = document.getElementById("filter").value;

    let percentages=[];

    records.forEach(r=>{
        if(r.name.toLowerCase().includes(search)){
            if(filter=="all" || 
              (filter=="safe" && r.status=="Safe") ||
              (filter=="risk" && r.status=="High Risk")){

                percentages.push(parseFloat(r.percentage));

                let row = `
                <tr>
                <td>${r.name}</td>
                <td>${r.subject}</td>
                <td>${r.percentage}%</td>
                <td class="${r.status=='Safe'?'safe':'risk'}">${r.status}</td>
                <td>${r.risk}</td>
                <td>${r.classesNeeded}</td>
                <td>${r.forecast}%</td>
                <td>${r.date}</td>
                </tr>`;
                tbody.innerHTML += row;
            }
        }
    });

    if(percentages.length>0){
        let avg = (percentages.reduce((a,b)=>a+b,0)/percentages.length).toFixed(2);
        document.getElementById("average").innerText=avg;
        document.getElementById("std").innerText=calculateStd(percentages);
    }

    updateChart(percentages);
}

let chart;
function updateChart(values){
    let ctx=document.getElementById("lineChart");

    if(chart) chart.destroy();

    chart=new Chart(ctx,{
        type:'line',
        data:{
            labels: records.map(r=>r.name),
            datasets:[{
                label:'Attendance %',
                data: records.map(r=>r.percentage),
                borderColor:'#00c6ff',
                fill:false
            }]
        }
    });
}

function exportCSV(){
    let csv="Name,Subject,Percentage,Status,Risk,ClassesNeeded,Forecast,Date\n";
    records.forEach(r=>{
        csv+=`${r.name},${r.subject},${r.percentage},${r.status},${r.risk},${r.classesNeeded},${r.forecast},${r.date}\n`;
    });

    let blob=new Blob([csv],{type:"text/csv"});
    let a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="attendance.csv";
    a.click();
}

function downloadPDF(){
    const { jsPDF } = window.jspdf;
    let doc = new jsPDF();
    doc.text("Attendance Report",10,10);
    let y=20;

    records.forEach(r=>{
        doc.text(`${r.name} - ${r.percentage}% - ${r.status}`,10,y);
        y+=10;
    });

    doc.save("attendance.pdf");
}

renderTable();

</script>
</body>
</html>
