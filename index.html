<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Attendance Monitoring & Predictive Analytics</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{background:#0f172a;color:white;font-family:Arial;margin:0}
header{background:#1e293b;padding:15px;text-align:center;font-size:22px;font-weight:bold}
.container{padding:20px}
.card{background:#1e293b;padding:20px;margin-bottom:20px;border-radius:10px}
input,button,select{padding:10px;margin:5px 0;width:100%;border-radius:5px;border:none}
button{background:#3b82f6;color:white;cursor:pointer}
button:hover{background:#2563eb}
table{width:100%;border-collapse:collapse}
th,td{padding:8px;border:1px solid #334155;text-align:center}
.safe{color:#22c55e}
.warning{color:#facc15}
.risk{color:#ef4444}
canvas{background:white;border-radius:10px;padding:10px}
</style>
</head>

<body>

<header>Smart Attendance Monitoring & Predictive Analytics</header>

<div class="container">

<div class="card">
<h3>Add Student Record</h3>
<input type="text" id="name" placeholder="Student Name">
<input type="text" id="subject" placeholder="Subject">
<input type="number" id="total" placeholder="Total Classes">
<input type="number" id="attended" placeholder="Attended Classes">
<input type="text" id="phone" placeholder="Phone (91xxxxxxxxxx)">
<button onclick="addRecord()">Add Record</button>
</div>

<div class="card">
<h3>Search & Filter</h3>
<input type="text" id="search" placeholder="Search by Name" onkeyup="displayRecords()">
<select id="filter" onchange="displayRecords()">
<option value="All">All</option>
<option value="Safe">Safe</option>
<option value="Warning">Warning</option>
<option value="High Risk">High Risk</option>
</select>
</div>

<div class="card">
<h3>Analytics Dashboard</h3>
<p id="classAverage"></p>
<p id="stdDevDisplay"></p>
<canvas id="pieChart"></canvas><br>
<canvas id="lineChart"></canvas>
</div>

<div class="card">
<h3>Student Records</h3>
<button onclick="exportCSV()">Export CSV</button>
<button onclick="downloadPDF()">Download PDF</button>
<table>
<thead>
<tr>
<th>Name</th>
<th>Subject</th>
<th>%</th>
<th>Forecast(5)</th>
<th>Need for 75%</th>
<th>Status</th>
<th>Date</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

</div>

<script>

let records = JSON.parse(localStorage.getItem("records")) || [];
let pieChart,lineChart;

function addRecord(){

let name=nameInput("name");
let subject=nameInput("subject");
let total=parseInt(nameInput("total"));
let attended=parseInt(nameInput("attended"));
let phone=nameInput("phone");

if(!name||!subject||!phone||total<=0||attended<0||attended>total){
alert("Invalid Input");return;
}

let percent=(attended/total)*100;

// 75% Rule
let status="Safe";
if(percent<75 && percent>=60) status="Warning";
if(percent<60) status="High Risk";

// Forecast after 5 classes
let forecast=((attended+5)/(total+5)*100).toFixed(2);

// Classes required to reach 75%
let required=0;
if(percent<75){
required=Math.ceil((0.75*total - attended)/0.25);
}

// Standard Deviation
let allPercents=records.map(r=>parseFloat(r.percent));
allPercents.push(percent);
let mean=allPercents.reduce((a,b)=>a+b,0)/allPercents.length;
let variance=allPercents.reduce((a,b)=>a+Math.pow(b-mean,2),0)/allPercents.length;
let stdDev=Math.sqrt(variance).toFixed(2);

// Save Record
let record={
name,subject,
percent:percent.toFixed(2),
forecast,
required,
status,
date:new Date().toLocaleString()
};

records.push(record);
localStorage.setItem("records",JSON.stringify(records));

updateAnalytics(stdDev);
displayRecords();
updateCharts();

// WhatsApp Alert if below 75%
if(percent<75){
let msg=`Hello ${name}, your attendance is ${percent.toFixed(2)}%.
Forecast after 5 classes: ${forecast}%.
You need ${required} more classes to reach 75%.`;
window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`,'_blank');
}

document.querySelectorAll("input").forEach(i=>i.value="");
}

function nameInput(id){return document.getElementById(id).value.trim();}

function updateAnalytics(stdDev){

if(records.length===0) return;

let avg=records.reduce((a,b)=>a+parseFloat(b.percent),0)/records.length;

document.getElementById("classAverage").innerHTML="Class Average: "+avg.toFixed(2)+"%";
document.getElementById("stdDevDisplay").innerHTML="Standard Deviation: "+stdDev;
}

function displayRecords(){

let tbody=document.getElementById("tableBody");
let search=document.getElementById("search").value.toLowerCase();
let filter=document.getElementById("filter").value;

tbody.innerHTML="";

records.forEach(r=>{
if(r.name.toLowerCase().includes(search) &&
(filter==="All"||r.status===filter)){
tbody.innerHTML+=`
<tr>
<td>${r.name}</td>
<td>${r.subject}</td>
<td>${r.percent}%</td>
<td>${r.forecast}%</td>
<td>${r.required}</td>
<td class="${r.status==='Safe'?'safe':r.status==='Warning'?'warning':'risk'}">${r.status}</td>
<td>${r.date}</td>
</tr>`;
}
});
}

function updateCharts(){

if(records.length===0) return;

let last=parseFloat(records[records.length-1].percent);
let missed=100-last;

if(pieChart) pieChart.destroy();
if(lineChart) lineChart.destroy();

pieChart=new Chart(pieChart=document.getElementById("pieChart"),{
type:"pie",
data:{labels:["Attended","Missed"],
datasets:[{data:[last,missed]}]}
});

lineChart=new Chart(document.getElementById("lineChart"),{
type:"line",
data:{
labels:records.map(r=>r.name),
datasets:[{label:"Attendance %",
data:records.map(r=>parseFloat(r.percent)),
fill:false,tension:0.3}]},
options:{scales:{y:{beginAtZero:true,max:100}}}
});
}

function exportCSV(){
let csv="Name,Subject,Percent,Forecast,Required,Status,Date\n";
records.forEach(r=>{
csv+=`${r.name},${r.subject},${r.percent},${r.forecast},${r.required},${r.status},${r.date}\n`;
});
let blob=new Blob([csv],{type:"text/csv"});
let link=document.createElement("a");
link.href=URL.createObjectURL(blob);
link.download="attendance.csv";
link.click();
}

function downloadPDF(){
const {jsPDF}=window.jspdf;
let doc=new jsPDF();
doc.text("Attendance Report",10,10);
let y=20;
records.forEach(r=>{
doc.text(`${r.name} - ${r.percent}% - ${r.status}`,10,y);
y+=10;
});
doc.save("attendance_report.pdf");
}

displayRecords();
updateCharts();

</script>

</body>
</html>
