<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intelligent Attendance Monitoring & Predictive Analytics System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {font-family:Arial;margin:0;background:#eef5ff;transition:0.3s;}
header{background:#0d47a1;color:white;padding:15px;text-align:center;font-size:18px;}
.container{max-width:1100px;margin:20px auto;display:grid;gap:20px;}
.card{background:white;padding:20px;border-radius:10px;box-shadow:0 5px 15px rgba(0,0,0,0.1);}
input,select{width:100%;padding:8px;margin-top:5px;border-radius:5px;border:1px solid #ccc;}
button{padding:8px 12px;margin:5px 5px 0 0;border:none;border-radius:5px;background:#ff9800;color:white;cursor:pointer;}
button:hover{background:#f57c00;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{border:1px solid #ddd;padding:8px;text-align:center;}
th{background:#1565c0;color:white;}
.safe{color:green;font-weight:bold;}
.warning{color:orange;font-weight:bold;}
.risk{color:red;font-weight:bold;}
.analytics{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;}
.analytics div{background:#f1f8ff;padding:10px;border-radius:8px;text-align:center;}
.dark{background:#121212;color:white;}
.dark .card{background:#1e1e1e;}
footer{text-align:center;padding:10px;font-size:14px;}
.log{max-height:150px;overflow-y:auto;font-size:13px;background:#f4f4f4;padding:10px;border-radius:5px;}
</style>
</head>

<body>

<header>
Intelligent Attendance Monitoring & Predictive Analytics System
<button onclick="toggleDark()">🌙</button>
</header>

<div class="container">

<div class="card">
<h2>Add Student Record</h2>

<label>Name</label>
<input type="text" id="name">

<label>Subject</label>
<input type="text" id="subject">

<label>Phone (with country code)</label>
<input type="text" id="phone" placeholder="919876543210">

<label>Email</label>
<input type="email" id="email" placeholder="student@email.com">

<label>Total Classes</label>
<input type="number" id="total">

<label>Attended</label>
<input type="number" id="attended">

<button onclick="addRecord()">Analyze & Save</button>

<div id="result"></div>
<canvas id="pieChart"></canvas>
<canvas id="radarChart"></canvas>
</div>

<div class="card">
<h2>Notification Log</h2>
<div class="log" id="log"></div>
</div>

<div class="card">
<h2>Records</h2>

<table id="table">
<thead>
<tr>
<th>Name</th>
<th>%</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

</div>

<footer>
Developed by Joshua | BSc Computer Science Final Year Project
</footer>

<script>
let records=[];
let pieChart, radarChart;

function toggleDark(){ document.body.classList.toggle("dark"); }

function calculateRiskScore(percent, missed, classAvg){
 let attendanceFactor=(100-percent)*0.6;
 let streakFactor=missed*0.2;
 let deviationFactor=Math.abs(classAvg-percent)*0.2;
 return (attendanceFactor+streakFactor+deviationFactor).toFixed(2);
}

function addLog(message){
 let log=document.getElementById("log");
 log.innerHTML+=`<div>${new Date().toLocaleTimeString()} - ${message}</div>`;
}

function addRecord(){
 let name=document.getElementById("name").value.trim();
 let subject=document.getElementById("subject").value.trim();
 let phone=document.getElementById("phone").value.trim();
 let email=document.getElementById("email").value.trim();
 let total=parseInt(document.getElementById("total").value);
 let attended=parseInt(document.getElementById("attended").value);

 if(!name||!subject||!phone||!email||total<=0||attended<0||attended>total){
  alert("Invalid Input");
  return;
 }

 let percent=(attended/total)*100;
 let missed=total-attended;
 let classAvg=records.length?records.reduce((a,b)=>a+parseFloat(b.percent),0)/records.length:percent;
 let mlScore=calculateRiskScore(percent,missed,classAvg);

 let status="";
 if(mlScore<20) status="Safe";
 else if(mlScore<40) status="Warning";
 else status="High Risk";

 let message=`Hello ${name}, your attendance is ${percent.toFixed(2)}%. Status: ${status}. Please improve immediately.`;
 let whatsappURL=`https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
 let mailURL=`mailto:${email}?subject=Attendance Alert&body=${encodeURIComponent(message)}`;

 document.getElementById("result").innerHTML=`
 <p><b>${name}</b></p>
 <p>Attendance: ${percent.toFixed(2)}%</p>
 <p>Status: <span class="${status==='Safe'?'safe':status==='Warning'?'warning':'risk'}">${status}</span></p>
 <p>ML Risk Score: ${mlScore}</p>
 ${percent<75?`<button onclick="window.open('${whatsappURL}')">📲 WhatsApp Alert</button>
 <button onclick="window.open('${mailURL}')">📧 Email Alert</button>`:""}
 `;

 records.push({name,percent,status,phone,email});
 display();

 document.getElementById("name").value="";
 document.getElementById("subject").value="";
 document.getElementById("phone").value="";
 document.getElementById("email").value="";
 document.getElementById("total").value="";
 document.getElementById("attended").value="";
}

function display(){
 let tbody=document.querySelector("#table tbody");
 tbody.innerHTML="";
 records.forEach((r,i)=>{
  let message=`Hello ${r.name}, your attendance is ${r.percent}%. Status: ${r.status}. Please improve immediately.`;
  let wa=`https://wa.me/${r.phone}?text=${encodeURIComponent(message)}`;
  let mail=`mailto:${r.email}?subject=Attendance Alert&body=${encodeURIComponent(message)}`;

  tbody.innerHTML+=`
  <tr>
  <td>${r.name}</td>
  <td>${r.percent}%</td>
  <td>${r.status}</td>
  <td>
  ${r.percent<75?`
  <button onclick="window.open('${wa}');addLog('WhatsApp alert sent to ${r.name}')">📲</button>
  <button onclick="window.open('${mail}');addLog('Email alert sent to ${r.name}')">📧</button>
  `:"Safe"}
  </td>
  </tr>`;
 });
}
</script>

</body>
</html>
