<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Attendance Analytics System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
padding:0;
}

header{
background:#1e293b;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

input,button{
padding:10px;
margin:5px 0;
width:100%;
border-radius:5px;
border:none;
}

button{
background:#3b82f6;
color:white;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

.safe{color:#22c55e;}
.warning{color:#facc15;}
.risk{color:#ef4444;}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
border:1px solid #334155;
text-align:center;
}

canvas{
background:white;
border-radius:10px;
padding:10px;
}
</style>
</head>

<body>

<header>Smart Attendance Monitoring & Predictive Analytics</header>

<div class="container">

<div class="card">
<h3>Add Student Record</h3>

<input type="text" id="name" placeholder="Student Name">
<input type="text" id="subject" placeholder="Subject">
<input type="number" id="total" placeholder="Total Classes">
<input type="number" id="attended" placeholder="Attended Classes">
<input type="text" id="phone" placeholder="Phone with country code (9198xxxxxxx)">
<button onclick="addRecord()">Add Record</button>
</div>

<div class="card">
<h3>Analytics Dashboard</h3>
<canvas id="pieChart"></canvas>
<br>
<canvas id="radarChart"></canvas>
</div>

<div class="card">
<h3>Student Records</h3>
<button onclick="exportCSV()">Export CSV</button>
<button onclick="downloadPDF()">Download PDF</button>
<table>
<thead>
<tr>
<th>Name</th>
<th>Subject</th>
<th>%</th>
<th>Status</th>
<th>Risk</th>
<th>Date</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<div class="card">
<h3>Alert Log (Low Attendance)</h3>
<ul id="alertLog"></ul>
</div>

</div>

<script>
let records = JSON.parse(localStorage.getItem("records")) || [];

let pieChart, radarChart;

function calculateRisk(percent){
let risk = 100 - percent;
return risk.toFixed(2);
}

function standardDeviation(){
let arr = records.map(r=>parseFloat(r.percent));
let mean = arr.reduce((a,b)=>a+b,0)/arr.length || 0;
let variance = arr.reduce((a,b)=>a+Math.pow(b-mean,2),0)/arr.length || 0;
return Math.sqrt(variance).toFixed(2);
}

function addRecord(){

let name = document.getElementById("name").value.trim();
let subject = document.getElementById("subject").value.trim();
let total = parseInt(document.getElementById("total").value);
let attended = parseInt(document.getElementById("attended").value);
let phone = document.getElementById("phone").value.trim();
if(!name||!subject||!phone||total<=0||attended<0||attended>total){
alert("Invalid Input");
return;
}

let percent=(attended/total)*100;
let risk=calculateRisk(percent);

let status="Safe";
if(percent<75 && percent>=60) status="Warning";
if(percent<60) status="High Risk";

let forecast=(percent+5).toFixed(2);

let record={
name,subject,
percent:percent.toFixed(2),
status,risk,
date:new Date().toLocaleString()
};

records.push(record);
localStorage.setItem("records",JSON.stringify(records));

updateCharts(attended,total-attended,subject,percent);
display();

if(percent<75){
let msg=`Hello ${name}, your attendance is ${percent.toFixed(2)}%. Please improve immediately.`;
let url=`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
window.open(url,'_blank');
document.getElementById("alertLog").innerHTML+=`<li>${name} - ${percent.toFixed(2)}%</li>`;
}

document.querySelectorAll("input").forEach(i=>i.value="");
}

function updateCharts(attended,missed,subject,percent){

if(pieChart) pieChart.destroy();
if(radarChart) radarChart.destroy();

pieChart=new Chart(document.getElementById("pieChart"),{
type:"pie",
data:{
labels:["Attended","Missed"],
datasets:[{data:[attended,missed]}]
}
});

radarChart=new Chart(document.getElementById("radarChart"),{
type:"radar",
data:{
labels:[subject],
datasets:[{label:"Attendance %",data:[percent]}]
}
});
}

function display(){
let tbody=document.getElementById("tableBody");
tbody.innerHTML="";
records.forEach(r=>{
tbody.innerHTML+=`
<tr>
<td>${r.name}</td>
<td>${r.subject}</td>
<td>${r.percent}%</td>
<td class="${r.status==='Safe'?'safe':r.status==='Warning'?'warning':'risk'}">${r.status}</td>
<td>${r.risk}</td>
<td>${r.date}</td>
</tr>
`;
});
}

function exportCSV(){
let csv="Name,Subject,Percent,Status,Risk,Date\n";
records.forEach(r=>{
csv+=`${r.name},${r.subject},${r.percent},${r.status},${r.risk},${r.date}\n`;
});
let blob=new Blob([csv],{type:"text/csv"});
let link=document.createElement("a");
link.href=URL.createObjectURL(blob);
link.download="attendance.csv";
link.click();
}

function downloadPDF(){
const {jsPDF}=window.jspdf;
let doc=new jsPDF();
doc.text("Attendance Report",10,10);
let y=20;
records.forEach(r=>{
doc.text(`${r.name} - ${r.percent}% - ${r.status}`,10,y);
y+=10;
});
doc.save("attendance_report.pdf");
}

display();
</script>

</body>
</html>
